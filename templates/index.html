<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFplay Test Patterns</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: var(--text);
        }

        header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        h1 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 16px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card h3 {
            margin-top: 0;
            font-weight: 500;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #0f172a;
            color: var(--text);
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            background: var(--accent);
            color: white;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button:active {
            transform: scale(0.97);
        }

        .stop-container {
            text-align: center;
            margin-top: 30px;
        }

        .stop-btn {
            background: var(--danger);
            width: 200px;
        }

        .stop-btn:hover {
            background: #dc2626;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.85rem;
            color: var(--muted);
        }
    </style>
</head>
<body>

<header>
    <h1>FFplay Test Pattern Controller</h1>
</header>

<div class="container">
    <div class="grid">
        {% for name in patterns %}
        <div class="card">
            <h3>{{ name }}</h3>
            <form method="POST" action="/play">
                <input type="hidden" name="pattern" value="{{ name }}">

                <select name="monitor">
                    {% for monitor in monitors %}
                    <option value="{{ monitor }}">{{ monitor }}</option>
                    {% endfor %}
                </select>

                <button type="submit">Play</button>
            </form>
        </div>
        {% endfor %}
    </div>

    <div class="stop-container">
        <form method="POST" action="/stop">
            <button class="stop-btn">Stop Output</button>
        </form>
    </div>
</div>

<footer>
    Test Pattern Generator • ©️ 2026 itsmejoshleach
</footer>

</body>
</html>
