<!DOCTYPE html>
<html>
<head>
    <title>Test Pattern Controller</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .top {
            padding: 15px;
        }

        h2 {
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .card {
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .card.selected {
            border: 2px solid #3b82f6;
        }

        img {
            width: 100%;
            border-radius: 6px;
        }

        .bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #111827;
            padding: 15px;
            display: flex;
            gap: 10px;
        }

        select, button {
            padding: 10px;
            flex: 1;
        }

        .go {
            background: #3b82f6;
            color: white;
            border: none;
        }

        .stop {
            background: red;
            color: white;
            border: none;
        }
    </style>

    <script>
        function selectPattern(name) {
            document.getElementById("pattern_input").value = name;

            document.querySelectorAll(".card").forEach(c =>
                c.classList.remove("selected")
            );

            document.getElementById("card_" + name).classList.add("selected");
        }
    </script>
</head>

<body>

<div class="top">
    <h2>Test Patterns</h2>

    <div class="grid">
        {% for name in patterns %}
        <div class="card {% if selected_pattern == name %}selected{% endif %}"
             id="card_{{ name }}"
             onclick="selectPattern('{{ name }}')">

            <img src="/preview/{{ name }}">
            <div>{{ name }}</div>

        </div>
        {% endfor %}
    </div>
</div>

<form method="POST">

    <input type="hidden" name="pattern" id="pattern_input" value="{{ selected_pattern or '' }}">

    <div class="bottom">

        <select name="output">
            <option value="file" {% if selected_output == "file" %}selected{% endif %}>
                Export to File
            </option>

            <option value="download" {% if selected_output == "download" %}selected{% endif %}>
                Download Render (choose save location)
            </option>

            {% for idx, m in monitors %}
            <option value="monitor_{{ idx }}"
                {% if selected_output == "monitor_" ~ idx %}selected{% endif %}>
                Monitor {{ idx+1 }} ({{ m.width }}x{{ m.height }})
            </option>
            {% endfor %}
        </select>

        <button class="go" type="submit">GO</button>

    </div>
</form>

<form method="POST" action="/stop">
    <div class="bottom" style="bottom:60px; justify-content:center;">
        <button class="stop">STOP</button>
    </div>
</form>

</body>
</html>
